apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shoreline
  namespace: argocd
spec:
  project: default
  source:
    chart: webapp
    repoURL: zot.soh.re
    targetRevision: 2.4.0
    helm:
      values: |
        name: shoreline
        replicaCount: 1
        service:
          type: ClusterIP
          port: 80
          targetPort: 8080
          name: shoreline
        virtualService:
          hosts:
            - "shoreline.soh.re"
        image:
          repository: zot.soh.re
          name: shoreline/shoreline
          tag: "latest"
          pullPolicy: Always

  destination:
    name: k3s.soh.re
    namespace: shoreline
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true

